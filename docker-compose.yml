# Docker Compose setup for Tap-Track

version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: tap_track
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - tap-track-network

  backend:
    build:
      context: ./backend
    depends_on:
      - postgres
    environment:
      DATABASE_URL: postgresql://postgres:password@postgres:5432/tap_track
      JWT_SECRET: tap-track-secret-key
      NODE_ENV: development
      PORT: 5000
    ports:
      - "5000:5000"
    networks:
      - tap-track-network
    volumes:
      - ./backend/src:/app/src

  frontend:
    build:
      context: ./frontend
    depends_on:
      - backend
    environment:
      REACT_APP_API_URL: http://backend:5000/api
    ports:
      - "3000:3000"
    networks:
      - tap-track-network
    volumes:
      - ./frontend/src:/app/src

volumes:
  postgres_data:

networks:
  tap-track-network:
    driver: bridge
